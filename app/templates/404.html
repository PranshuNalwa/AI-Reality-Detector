{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-page__glow"></div>
    <div class="error-page__content">
        <h1 class="error-page__code">4<span class="gold-text">0</span>4</h1>
        <h2 class="error-page__title">Page Not Found</h2>
        <p class="error-page__message">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('index') }}" class="btn btn--gold btn--lg">
            <i data-lucide="home" class="btn__icon"></i> Back to Home
        </a>
    </div>
</section>
{% endblock %}
